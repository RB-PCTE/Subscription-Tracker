<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Subscription Tracker</h1>

      <section class="card" aria-labelledby="auth-heading">
        <h2 id="auth-heading">Authentication</h2>

        <div id="signed-out-view">
          <label for="email-input">Email</label>
          <div class="row auth-row">
            <input id="email-input" type="email" placeholder="you@example.com" autocomplete="email" />
            <button id="send-magic-link-btn" type="button">Send magic link</button>
          </div>

          <label for="password-input">Password</label>
          <div class="row auth-row">
            <input id="password-input" type="password" placeholder="••••••••" autocomplete="current-password" />
            <button id="sign-in-password-btn" type="button">Sign in with password</button>
            <button id="sign-up-password-btn" type="button" class="secondary">Sign up with password</button>
          </div>
        </div>

        <div id="signed-in-view" hidden>
          <p>Signed in as <strong id="user-email"></strong></p>
          <button id="sign-out-btn" type="button">Sign out</button>
        </div>

        <p id="auth-status" role="status" aria-live="polite"></p>
      </section>

      <section id="subscriptions-section" class="card" aria-labelledby="subscriptions-heading" hidden>
        <h2 id="subscriptions-heading">Subscriptions</h2>

        <div class="toolbar">
          <button id="add-subscription-btn" type="button">Add subscription</button>
          <input
            id="search-input"
            type="search"
            placeholder="Search vendor, product, or plan"
            aria-label="Search subscriptions"
          />
          <select id="status-filter" aria-label="Filter by status">
            <option value="all">All</option>
            <option value="active">active</option>
            <option value="cancelled">cancelled</option>
            <option value="expired">expired</option>
          </select>
        </div>

        <p id="subscription-status" role="status" aria-live="polite"></p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Vendor</th>
                <th>Product</th>
                <th>Plan</th>
                <th>Amount</th>
                <th>Cycle</th>
                <th>Renewal</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="subscriptions-body"></tbody>
          </table>
        </div>

        <div id="empty-state" class="empty-state" hidden>
          <p>No subscriptions yet</p>
          <button id="empty-add-btn" type="button">Add subscription</button>
        </div>
      </section>
    </main>

    <dialog id="subscription-dialog">
      <form id="subscription-form" method="dialog" novalidate>
        <h3 id="form-title">Add subscription</h3>

        <label>
          Vendor name *
          <input id="vendor-name" name="vendor_name" required />
        </label>

        <label>
          Product name
          <input id="product-name" name="product_name" />
        </label>

        <label>
          Plan
          <input id="plan" name="plan" />
        </label>

        <label>
          Cost amount
          <input id="cost-amount" name="cost_amount" type="number" step="0.01" min="0" />
        </label>

        <label>
          Cost currency
          <input id="cost-currency" name="cost_currency" value="AUD" />
        </label>

        <label>
          Billing cycle
          <input id="billing-cycle" name="billing_cycle" value="monthly" list="billing-cycle-options" />
          <datalist id="billing-cycle-options">
            <option value="monthly"></option>
            <option value="annual"></option>
            <option value="quarterly"></option>
          </datalist>
        </label>

        <label>
          Renewal date
          <input id="renewal-date" name="renewal_date" type="date" />
        </label>

        <label>
          Status
          <select id="form-status" name="status">
            <option value="active">active</option>
            <option value="cancelled">cancelled</option>
            <option value="expired">expired</option>
          </select>
        </label>

        <label>
          Notes
          <textarea id="notes" name="notes" rows="3"></textarea>
        </label>

        <p id="form-error" class="error-text" role="alert"></p>

        <div class="dialog-actions">
          <button id="save-subscription-btn" type="submit">Save</button>
          <button id="cancel-subscription-btn" type="button" class="secondary">Cancel</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
